<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelaMateria - Início</title>
    <link rel="stylesheet" href="TelaAulas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-inicio">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active"><i class="fas fa-th-large"></i> Início</a>
                <a href="TelaMateria.html" class="nav-item"><i class="fas fa-book"></i> Disciplinas</a>
                <a href="TelaExercicios.html" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
                <a href="#" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a href="#" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a href="#" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                <div class="spacer"></div>
                <a href="#" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Pesquisar">
                </div>
                
                <div class="user-info-header">
                    <div class="user-profile">
                        <img src="https://via.placeholder.com/40" alt="Avatar" class="avatar">
                        <div class="user-text">
                            <span class="user-name">Eduardo Costa</span>
                            <span class="user-status">Online</span>
                        </div>
                    </div>
                    <div class="top-icons">
                        <i class="far fa-bell"></i>
                        <i class="fas fa-cog"></i>
                    </div>
                </div>
            </header>

            <section class="content-body">
                <h1 class="welcome-text">Bem-vindo de volta, Eduardo!</h1>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Aulas Assistidas</h3>
                        <p class="stat-number">24</p>
                    </div>
                    <div class="stat-card">
                        <h3>Exercícios Feitos</h3>
                        <p class="stat-number">142</p>
                    </div>
                    <div class="stat-card">
                        <h3>Desempenho Médio</h3>
                        <p class="stat-number">85%</p>
                    </div>
                </div>

                <h2 class="section-title">Continue de onde parou</h2>
                <div class="continue-card">
                    <div class="continue-info">
                        <span class="tag">Matemática</span>
                        <h3>Racionalização - Aula 03</h3>
                    </div>
                    <button class="btn-play"><i class="fas fa-play"></i></button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
