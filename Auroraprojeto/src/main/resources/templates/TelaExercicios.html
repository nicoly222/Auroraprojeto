<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Exercícios</title>

    <link rel="stylesheet" href="TelaExercicios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar-exercicios">
        <div class="logo-section">
            <i class="fas fa-graduation-cap"></i>
        </div>

        <nav class="nav-menu">
            <a href="/inicio"><i class="fas fa-th-large"></i> Início</a>
            <a href="/disciplinas"><i class="fas fa-book"></i> Disciplinas</a>
            <a href="/exercicios" class="active"><i class="fas fa-edit"></i> Exercícios</a>
            <a href="/perfil"><i class="fas fa-user"></i> Perfil</a>
            <a href="/login"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </nav>
    </aside>

    <!-- Conteúdo principal -->
    <main class="main-layout">

        <header class="header-top">
            <input type="text" placeholder="Pesquisar exercícios...">

            <div class="user-profile">
                <img src="https://via.placeholder.com/40" alt="Avatar">
                <span>Eduardo Costa</span>
            </div>
        </header>

        <section class="content-body">
            <h1>Exercícios</h1>

            <div class="exercise-list">
                <div class="exercise-bar">
                    <span>ENEM - Matemática</span>
                    <span>50</span>
                </div>

                <div class="exercise-bar">
                    <span>ENEM - Português</span>
                    <span>25</span>
                </div>

                <div class="exercise-bar">
                    <span>UERJ - Português</span>
                    <span>75</span>
                </div>
            </div>
        </section>

    </main>

</div>
</body>
</html>
