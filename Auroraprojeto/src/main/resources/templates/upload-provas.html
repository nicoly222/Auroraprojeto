<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Admin - Upload de Provas</title>
    <link rel="stylesheet" href="/AdminStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper"><i class="fas fa-user-shield"></i></div>
            </div>
            <nav class="nav-menu">
                <a href="/admin" class="nav-item"><i class="fas fa-chart-line"></i> Painel Geral</a>
                <a href="/admin/conteudo" class="nav-item"><i class="fas fa-video"></i> Gerenciar Aulas</a>
                <a href="/admin/provas" class="nav-item active"><i class="fas fa-file-upload"></i> Upload Provas</a>
                <a href="/admin/materiais" class="nav-item"><i class="fas fa-folder-plus"></i> Materiais Extras</a>
            </nav>
            <div class="spacer"></div>
            <div class="sidebar-footer-actions">
                <a href="/login" class="footer-item"><i class="fas fa-sign-out-alt"></i> Sair</a>
                <a href="/admin" class="admin-gear-btn"><i class="fas fa-cog"></i></a>
            </div>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <h1>Upload de Provas Anteriores</h1>
                <p>Disponibilize exames em PDF para os alunos praticarem.</p>
            </header>

            <section class="admin-form-section">
                <div class="video-info-box">
                    <form class="admin-form">
                        <div class="form-group">
                            <label><i class="fas fa-university"></i> Instituição / Vestibular</label>
                            <input type="text" placeholder="Ex: ENEM, FUVEST, UNICAMP...">
                        </div>

                        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                            <div class="form-group">
                                <label><i class="far fa-calendar-alt"></i> Ano da Prova</label>
                                <input type="number" placeholder="Ex: 2024">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-layer-group"></i> Fase</label>
                                <select style="padding: 12px; border-radius: 10px; border: 1px solid #eee; background: #fcfcfc;">
                                    <option>1ª Fase</option>
                                    <option>2ª Fase</option>
                                    <option>Fase Única</option>
                                </select>
                            </div>
                        </div>

                        <div class="upload-area" style="border: 2px dashed #9b6bff; padding: 30px; border-radius: 20px; text-align: center; margin-top: 20px;">
                            <i class="fas fa-file-pdf" style="font-size: 40px; color: #9b6bff; margin-bottom: 15px;"></i>
                            <p>Arraste o arquivo PDF aqui ou clique abaixo</p>
                            <input type="file" id="pdf-file" style="display: none;" accept="application/pdf">
                            <label for="pdf-file" class="btn-secondary" style="margin-top: 15px; display: inline-block; padding: 10px 25px; cursor: pointer;">
                                Selecionar PDF
                            </label>
                        </div>

                        <button type="submit" class="btn-primary" style="margin-top: 25px; width: 100%;">
                            <i class="fas fa-upload"></i> Publicar Prova
                        </button>
                    </form>
                </div>
            </section>
        </main>

        <aside class="right-column">
            <div class="profile-card">
                <div class="icon-circle" style="font-size: 40px; color: #9b6bff; margin-bottom: 10px;">
                    <i class="fas fa-history"></i>
                </div>
                <h3>Recém Adicionadas</h3>
            </div>

            <div class="calendar-card" style="margin-top: 20px;">
                <ul class="admin-list" style="list-style: none; font-size: 13px;">
                    <li style="padding: 10px 0; border-bottom: 1px solid #f0f0f0;">
                        <strong>FUVEST 2024</strong> <br> <span style="color: #888;">Adicionado hoje</span>
                    </li>
                    <li style="padding: 10px 0; border-bottom: 1px solid #f0f0f0;">
                        <strong>ENEM 2023</strong> <br> <span style="color: #888;">Adicionado ontem</span>
                    </li>
                </ul>
            </div>
        </aside>
    </div>

</body>
</html>
