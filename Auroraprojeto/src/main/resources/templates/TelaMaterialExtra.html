    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-material">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="TelaInicio.html" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a href="TelaDisciplinas.html" class="nav-item"><i class="fas fa-book"></i> Disciplinas</a>
                <a href="TelaExercicios.html" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
                <a href="TelaProvas.html" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>

            </nav>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Pesquisar livros, PDFs ou resumos">
                </div>
                
                <div class="user-info-header">
                    <div class="user-profile">
                        <img src="https://via.placeholder.com/40" alt="Avatar" class="avatar">
                        <div class="user-text">
                            <span class="user-name">Eduardo Costa</span>
                            <span class="user-status">Online</span>
                        </div>
                    </div>
                    <div class="top-icons">
                        <i class="far fa-bell"></i>
                        <i class="fas fa-cog"></i>
                    </div>
                </div>
            </header>

            <section class="content-body">
                <h1 class="title-page">Material Extra</h1>
                
                <div class="categorias-extras">
                    <button class="cat-button">Resumos em PDF</button>
                    <button class="cat-button">Mapas Mentais</button>
                    <button class="cat-button">E-books Recomendados</button>
                    <button class="cat-button">Formulários</button>
                </div>

                <h2 class="sub-title">Adicionados recentemente</h2>
                <div class="material-grid">

                            <h4>Fórmulas de Física</h4>
                            <span>PDF - 12MB</span>
                        </div>
                    </div>
                    <div class="book-card">

                        <div class="book-info">
